<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Orange rounded background -->
  <rect width="32" height="32" rx="6" fill="#f97316"/>
  <!-- Drone body (center) -->
  <rect x="13" y="13" width="6" height="6" rx="1.5" fill="white"/>
  <!-- Diagonal arms from center to propeller positions -->
  <line x1="14" y1="14" x2="9" y2="9" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="14" x2="23" y2="9" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="18" x2="9" y2="23" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="18" x2="23" y2="23" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- 4 propeller discs at arm tips -->
  <circle cx="8" cy="8" r="3.5" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1.2"/>
  <circle cx="24" cy="8" r="3.5" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1.2"/>
  <circle cx="8" cy="24" r="3.5" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1.2"/>
  <circle cx="24" cy="24" r="3.5" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="1.2"/>
</svg>
